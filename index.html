<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget</title>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="manifest" href="site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#f6f5f1;--surface:#fff;--surface2:#efede7;--border:rgba(0,0,0,0.07);--border-md:rgba(0,0,0,0.12);--text:#1c1b18;--text-2:#6b6a63;--text-3:#a0998e;--accent:#2d27a0;--red:#b83030;--red-light:#fdf0ee;--green:#1a6644;--green-light:#e8f5ee;--blue:#185fa5;--blue-light:#e6f1fb;--radius:14px;--radius-sm:8px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;--shadow-sm:0 1px 3px rgba(0,0,0,0.05);--shadow:0 2px 8px rgba(0,0,0,0.07);--shadow-md:0 4px 20px rgba(0,0,0,0.09)}
@media(prefers-color-scheme:dark){:root{--bg:#131210;--surface:#1e1c19;--surface2:#272420;--border:rgba(255,255,255,0.07);--border-md:rgba(255,255,255,0.12);--text:#f0ede6;--text-2:#9e9a90;--text-3:#6b6860;--accent:#9d98f5;--red:#e07068;--red-light:#2a1c1a;--green:#52c48a;--green-light:#162a1f;--blue:#6ab0e8;--blue-light:#0c2035}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
.page{max-width:1060px;margin:0 auto;padding:2rem 1.5rem 5rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
.wordmark{font-size:20px;font-weight:500;letter-spacing:-0.4px}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sync-pill{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:100px;font-size:12px;font-weight:500;border:1px solid var(--border-md);background:var(--surface);color:var(--text-2)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text-3);flex-shrink:0;transition:background 0.3s}
.sync-pill.syncing .sync-dot{background:#BA7517;animation:pulse 1s infinite}
.sync-pill.synced .sync-dot{background:var(--green)}
.sync-pill.error .sync-dot{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.icon-btn{height:34px;padding:0 12px;border:1px solid var(--border-md);border-radius:var(--radius-sm);background:var(--surface);font:13px var(--font);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all 0.15s;white-space:nowrap;color:var(--text-2);text-decoration:none}
.icon-btn:hover{background:var(--surface2);color:var(--text)}
.export-btn{color:var(--green)}.import-btn{color:var(--accent)}
.view-wrap{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-2)}
.view-wrap select{height:34px;border:1px solid var(--border-md);border-radius:var(--radius-sm);padding:0 10px;font:13px var(--font);background:var(--surface);color:var(--text);outline:none;cursor:pointer;min-width:150px;transition:border-color 0.15s}
.view-wrap select:focus{border-color:var(--accent)}
.delta-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1.25rem}
.delta-card{border-radius:var(--radius);padding:1.1rem 1.25rem;border:1px solid var(--border);background:var(--surface);box-shadow:var(--shadow-sm)}
.delta-card .lbl{font-size:11px;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:7px;font-weight:500}
.delta-card .val{font:500 22px/1 var(--mono)}.delta-card .sub{font-size:11px;margin-top:5px}
.dc-income{background:var(--green-light);border-color:rgba(26,102,68,0.2)}.dc-income .lbl,.dc-income .val,.dc-income .sub{color:var(--green)}
.dc-expense{background:var(--red-light);border-color:rgba(184,48,48,0.2)}.dc-expense .lbl,.dc-expense .val,.dc-expense .sub{color:var(--red)}
.dc-positive{background:var(--green-light);border-color:rgba(26,102,68,0.2)}.dc-positive .lbl,.dc-positive .val,.dc-positive .sub{color:var(--green)}
.dc-negative{background:var(--red-light);border-color:rgba(184,48,48,0.2)}.dc-negative .lbl,.dc-negative .val,.dc-negative .sub{color:var(--red)}
.dc-zero{background:var(--surface2)}.dc-zero .lbl,.dc-zero .val{color:var(--text-2)}.dc-zero .sub{color:var(--text-3)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem}
.stat{background:var(--surface2);border-radius:var(--radius-sm);padding:0.9rem 1.1rem}
.stat .lbl{font-size:11px;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-3);margin-bottom:6px;font-weight:500}
.stat .val{font:500 20px/1 var(--mono)}.stat .val.red{color:var(--red)}.stat .val.blue{color:var(--blue)}.stat .val.purple{color:var(--accent)}
.add-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:1.5rem;box-shadow:var(--shadow-sm)}
.form-tabs{display:flex;gap:6px;margin-bottom:1rem}
.ftab{padding:5px 14px;border-radius:100px;border:1px solid var(--border-md);font:500 12px var(--font);cursor:pointer;background:transparent;color:var(--text-2);transition:all 0.15s}
.ftab:hover{background:var(--surface2)}.ftab.active{background:var(--accent);color:#fff;border-color:var(--accent)}.ftab.income-tab.active{background:var(--green);border-color:var(--green)}
.form-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-3);font-weight:500}
.field input,.field select{height:38px;border:1px solid var(--border-md);border-radius:var(--radius-sm);padding:0 11px;font:14px var(--font);background:var(--surface);color:var(--text);outline:none;transition:border-color 0.15s,box-shadow 0.15s}
.field input:focus,.field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,39,160,0.1)}
.field.fdesc{flex:2;min-width:150px;position:relative}.field.famt{width:115px}.field.fdate{width:145px}.field.fcat{flex:1;min-width:165px}.field.fpers{width:95px}
.add-btn{height:38px;padding:0 20px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font:500 14px var(--font);cursor:pointer;white-space:nowrap;transition:background 0.15s,transform 0.1s}
.add-btn:hover{background:#231e88}.add-btn:active{transform:scale(0.98)}.add-btn.income-btn{background:var(--green)}.add-btn.income-btn:hover{background:#145234}.add-btn:disabled{opacity:0.55;cursor:not-allowed;transform:none}
.suggestion{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border-md);border-radius:var(--radius-sm);z-index:100;margin-top:4px;overflow:hidden;box-shadow:var(--shadow-md)}
.sug-item{padding:9px 12px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:10px;transition:background 0.1s}
.sug-item:hover{background:var(--surface2)}.sug-name{font-weight:500;font-size:13px}.sug-meta{font-size:11px;color:var(--text-3);margin-top:2px}
.sug-badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:500;white-space:nowrap}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;box-shadow:var(--shadow-sm)}
.card-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-3);margin-bottom:0.9rem}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;font-size:11px;color:var(--text-2)}.legend span{display:flex;align-items:center;gap:5px}.legend .sq{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.fixed-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:1.25rem;box-shadow:var(--shadow-sm)}
.fixed-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}.fixed-header .card-title{margin-bottom:0}
.fixed-total-badge{font-size:12px;font-weight:500;color:var(--blue);background:var(--blue-light);padding:3px 10px;border-radius:6px;font-family:var(--mono)}
.fixed-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.fixed-item{display:flex;flex-direction:column;gap:6px}
.fixed-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-3);display:flex;align-items:center;gap:5px}
.fixed-input{height:40px;border:1px solid var(--border-md);border-radius:var(--radius-sm);padding:0 12px;font:500 15px var(--mono);background:var(--surface);color:var(--text);outline:none;width:100%;transition:all 0.15s}
.fixed-input::placeholder{font-weight:400;color:var(--text-3);font-size:13px;font-family:var(--font)}
.fixed-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,0.1)}.fixed-input.filled{border-color:rgba(24,95,165,0.4);color:var(--blue);background:var(--blue-light)}
.cat-list{display:flex;flex-direction:column;gap:2px}
.cat-row{display:flex;align-items:center;padding:7px 8px;border-radius:var(--radius-sm);cursor:pointer;transition:background 0.12s;gap:8px}
.cat-row:hover,.cat-row.active{background:var(--surface2)}.cat-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.cat-name{font-size:13px;flex:1}.cat-amt{font-size:13px;font-weight:500;font-family:var(--mono)}.cat-pct{font-size:11px;color:var(--text-3);min-width:32px;text-align:right;font-family:var(--mono)}
.section-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-3);margin-bottom:0.6rem;margin-top:1.25rem}
.tx-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:1.5rem;box-shadow:var(--shadow-sm)}
.col-expense{grid-template-columns:82px 1fr 92px 118px 58px 76px}.col-income{grid-template-columns:82px 1fr 92px 58px 76px}
.tx-head{display:grid;gap:8px;padding:8px 14px;font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-3);border-bottom:1px solid var(--border);background:var(--surface2)}
.tx-row{display:grid;gap:8px;padding:10px 14px;font-size:13px;align-items:center;border-bottom:1px solid var(--border);transition:background 0.1s}
.tx-row:last-child{border-bottom:none}.tx-row:hover{background:var(--surface2)}.tx-row.editing{background:var(--surface2)}
.section-sep{font-size:10px;font-weight:500;padding:5px 14px 3px;text-transform:uppercase;letter-spacing:0.07em}
.date-cell{font-size:12px;color:var(--text-3);font-family:var(--mono);white-space:nowrap}.desc-cell{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.amt-cell{font-weight:500;font-family:var(--mono)}
.badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:500;white-space:nowrap}
.action-btns{display:flex;gap:4px}
.btn-sm{height:26px;padding:0 9px;font-size:11px;font-weight:500;border:1px solid var(--border-md);border-radius:6px;background:transparent;cursor:pointer;color:var(--text-2);transition:all 0.12s;font-family:var(--font)}
.btn-sm:hover{background:var(--surface2)}.btn-del{color:var(--red);border-color:rgba(184,48,48,0.25)}.btn-del:hover{background:var(--red-light)}
.btn-save{color:var(--green);border-color:rgba(26,102,68,0.3);font-weight:600}.btn-save:hover{background:var(--green-light)}
.edit-input{height:28px;border:1px solid var(--border-md);border-radius:6px;padding:0 7px;font:12px var(--font);background:var(--surface);color:var(--text);width:100%;outline:none}
.edit-input:focus{border-color:var(--accent)}
.edit-select{height:28px;border:1px solid var(--border-md);border-radius:6px;padding:0 6px;font:12px var(--font);background:var(--surface);color:var(--text);width:100%;outline:none}
.empty{text-align:center;padding:2.5rem;color:var(--text-3);font-size:13px}
.main-page.hidden{display:none}
.summary-page{display:none}.summary-page.active{display:block}
.smg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:1.5rem}
.smc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.1rem;box-shadow:var(--shadow-sm);cursor:pointer;transition:box-shadow 0.2s}
.smc:hover{box-shadow:var(--shadow)}.smc-name{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-3);margin-bottom:8px}
.smc-exp{font:500 20px/1 var(--mono);color:var(--red);margin-bottom:4px}.smc-inc{font-size:12px;color:var(--green);margin-bottom:6px}
.smc-delta{font-size:12px;font-weight:500}.smc-delta.pos{color:var(--green)}.smc-delta.neg{color:var(--red)}
.mini-bars{display:flex;align-items:flex-end;gap:2px;height:28px;margin-top:10px;border-bottom:1px solid var(--border)}.mini-bar{flex:1;border-radius:2px 2px 0 0;min-height:2px}
.sum-charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.5rem}
.bdown-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}.tscroll{overflow-x:auto}
.btbl{width:100%;border-collapse:collapse;font-size:12px}
.btbl th{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-3);padding:8px 12px;border-bottom:1px solid var(--border);text-align:right;font-weight:500;white-space:nowrap;background:var(--surface2)}.btbl th:first-child{text-align:left}
.btbl td{padding:7px 12px;border-bottom:1px solid var(--border);text-align:right;font-family:var(--mono);white-space:nowrap}.btbl td:first-child{text-align:left;font-family:var(--font)}
.btbl tr:last-child td{border-bottom:none}.btbl tr:hover td{background:var(--surface2)}
.tot-row td{font-weight:500;background:var(--surface2)!important;border-top:1px solid var(--border-md)}
.cdot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:7px;vertical-align:middle}
.zcell{color:var(--text-3)}.t-up{color:var(--red);font-size:11px;font-family:var(--font)}.t-dn{color:var(--green);font-size:11px;font-family:var(--font)}.t-fl{color:var(--text-3);font-size:11px;font-family:var(--font)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.delta-bar{animation:fadeUp .35s ease both .05s}.stats-row{animation:fadeUp .35s ease both .1s}.add-form{animation:fadeUp .35s ease both .15s}.charts-row{animation:fadeUp .35s ease both .2s}.fixed-card{animation:fadeUp .35s ease both .25s}
@media(max-width:700px){.charts-row,.sum-charts{grid-template-columns:1fr}.delta-bar{grid-template-columns:1fr}.fixed-grid{grid-template-columns:1fr 1fr}.col-expense{grid-template-columns:70px 1fr 80px 80px 50px}.col-income{grid-template-columns:70px 1fr 80px 50px}}
@media(max-width:480px){.page{padding:1rem 1rem 4rem}.fixed-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="wordmark">Budget</div>
    <div class="topbar-right">
      <div class="sync-pill" id="syncPill"><div class="sync-dot"></div><span id="syncLabel">Connecting&#8230;</span></div>
      <button class="icon-btn export-btn" onclick="exportExcel()">&#8595; Export</button>
      <label class="icon-btn import-btn" style="cursor:pointer">&#8593; Import<input type="file" id="importFile" accept=".xlsx" style="display:none" onchange="importExcel(event)"></label>
      <div class="view-wrap"><span>Viewing</span><select id="viewSel" onchange="onViewChange()"></select></div>
    </div>
  </div>

  <div class="main-page" id="mainPage">
    <div class="delta-bar" id="deltaBar"></div>
    <div class="stats-row" id="statsRow"></div>
    <div class="add-form">
      <div class="form-tabs">
        <button class="ftab active" id="tabExpense" onclick="setFormMode('expense')">Expense</button>
        <button class="ftab income-tab" id="tabIncome" onclick="setFormMode('income')">Income</button>
      </div>
      <div class="form-row" id="formRow"></div>
    </div>
    <div class="charts-row">
      <div class="card"><div class="card-title">Spending by category</div><div class="legend" id="pieLeg"></div><div style="position:relative;height:210px"><canvas id="pieChart" role="img" aria-label="Spending by category"></canvas></div></div>
      <div class="card"><div class="card-title">Colin vs Monica</div><div class="legend" id="pie2Leg"></div><div style="position:relative;height:210px"><canvas id="pie2Chart" role="img" aria-label="Colin vs Monica"></canvas></div></div>
    </div>
    <div class="fixed-card" id="fixedCard"></div>
    <div class="card" style="margin-bottom:1.25rem"><div class="card-title">Categories</div><div class="cat-list" id="catList"></div></div>
    <div class="section-label">Income</div>
    <div class="tx-card" id="incomeSection"></div>
    <div class="section-label">Expenses</div>
    <div class="tx-card"><div id="txList"></div></div>
  </div>

  <div class="summary-page" id="summaryPage">
    <div class="smg" id="smg"></div>
    <div class="sum-charts">
      <div class="card"><div class="card-title">Spending trend</div><div class="legend"><span><span class="sq" style="background:#b83030"></span>Expenses</span>&nbsp;<span><span class="sq" style="background:#1a6644"></span>Income</span></div><div style="position:relative;height:200px"><canvas id="trendChart" role="img" aria-label="Spending trend"></canvas></div></div>
      <div class="card"><div class="card-title">Income vs expenses</div><div class="legend"><span><span class="sq" style="background:#1a6644"></span>Income</span>&nbsp;<span><span class="sq" style="background:#b83030"></span>Expenses</span></div><div style="position:relative;height:200px"><canvas id="incExpChart" role="img" aria-label="Income vs expenses"></canvas></div></div>
    </div>
    <div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-3);margin-bottom:0.75rem">Category breakdown by month</div>
    <div class="bdown-card"><div class="tscroll"><table class="btbl" id="btbl"></table></div></div>
  </div>
</div>
<script>
const SU='https://kxrsuiexxvqwmqjqzclx.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cnN1aWV4eHZxd21xanF6Y2x4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDM5NDYsImV4cCI6MjA5MjI3OTk0Nn0.IAJcaFQQRjUa5UAnm9P2Mo58TZqA1G8NmdWXYB_Ofaw';
const H={'Content-Type':'application/json','apikey':SK,'Authorization':'Bearer '+SK};
async function sbGet(t){const r=await fetch(`${SU}/rest/v1/${t}?select=*`,{headers:H});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbUp(t,row){const r=await fetch(`${SU}/rest/v1/${t}`,{method:'POST',headers:{...H,'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(row)});if(!r.ok)throw new Error(await r.text());}
async function sbDel(t,id){const col=t==='fixed_costs'?'month_key':'id';const r=await fetch(`${SU}/rest/v1/${t}?${col}=eq.${encodeURIComponent(id)}`,{method:'DELETE',headers:H});if(!r.ok)throw new Error(await r.text());}
function ss(s,l){document.getElementById('syncPill').className='sync-pill '+s;document.getElementById('syncLabel').textContent=l;}

const CATS=[
  {id:'groceries',  label:'Groceries',        colors:['#EAF3DE','#639922','#27500A']},
  {id:'restaurants',label:'Restaurants',       colors:['#FAEEDA','#BA7517','#633806']},
  {id:'rent',       label:'Rent & fixed',      colors:['#E6F1FB','#378ADD','#0C447C']},
  {id:'transport',  label:'Transport',         colors:['#F1EFE8','#888780','#444441']},
  {id:'outings',    label:'Outings & culture', colors:['#EEEDFE','#7F77DD','#3C3489']},
  {id:'appearance', label:'Appearance',        colors:['#FBEAF0','#D4537E','#72243E']},
  {id:'travel',     label:'Travel',            colors:['#FAECE7','#D85A30','#712B13']},
  {id:'other',      label:'Other',             colors:['#F1EFE8','#5F5E5A','#444441']},
];
const FF=[
  {id:'rent',label:'Rent',icon:'\u{1F3E0}',ph:'e.g. 980,00'},
  {id:'electricity',label:'Electricity',icon:'\u26A1',ph:'e.g. 42,00'},
  {id:'water',label:'Water',icon:'\uD83D\uDCA7',ph:'e.g. 27,00'},
  {id:'internet',label:'Internet / Phone',icon:'\uD83D\uDCE1',ph:'e.g. 39,00'},
];
const MO=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let txs=[],inc=[],fx={};
const now=new Date();
let vm=now.getMonth(),vy=now.getFullYear();
let pc=null,p2c=null,tc=null,bc=null;
let acat=null,fm='expense',eid=null,et=null,cv='month';

async function loadAll(){
  ss('syncing','Loading\u2026');
  try{
    const[tr,ir,fr]=await Promise.all([sbGet('transactions'),sbGet('income'),sbGet('fixed_costs')]);
    txs=tr.map(r=>({id:r.id,desc:r.description,amt:+r.amt,cat:r.cat,pers:r.pers,date:r.tx_date,month:r.month,year:r.year}));
    inc=ir.map(r=>({id:r.id,desc:r.description,amt:+r.amt,pers:r.pers,date:r.tx_date,month:r.month,year:r.year}));
    fx={};fr.forEach(r=>{fx[r.month_key]={rent:r.rent||0,electricity:r.electricity||0,water:r.water||0,internet:r.internet||0};});
    ss('synced','Synced');renderAll();
  }catch(e){ss('error','Load failed');console.error(e);renderAll();}
}

function pa(s){
  s=String(s).trim();
  const d=(s.match(/\./g)||[]).length,c=(s.match(/,/g)||[]).length;
  if(c===1&&d===0)s=s.replace(',','.');
  else if(d>=1&&c===1)s=s.replace(/\./g,'').replace(',','.');
  else if(c>=1&&d===1)s=s.replace(/,/g,'');
  return Math.abs(parseFloat(s)||0);
}
function f(n){return n.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fs(n){return n>=1000?(n/1000).toFixed(1)+'k':String(Math.round(n));}
function td(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fd(s){if(!s)return'\u2014';const[y,m,d]=s.split('-');return`${d}/${m}`;}
function dmy(ds){if(!ds)return{month:now.getMonth(),year:now.getFullYear()};const d=new Date(ds);return{month:d.getMonth(),year:d.getFullYear()};}
function mk(mo,yr){return`${yr}-${String(mo+1).padStart(2,'0')}`;}
function gvt(){return txs.filter(t=>t.month===vm&&t.year===vy);}
function gvi(){return inc.filter(t=>t.month===vm&&t.year===vy);}
function gfx(mo,yr){return fx[(mo===undefined)?mk(vm,vy):mk(mo,yr)]||{};}
function fxt(mo,yr){return Object.values(gfx(mo,yr)).reduce((s,v)=>s+(v||0),0);}
function cbi(id){return CATS.find(c=>c.id===id)||CATS[CATS.length-1];}
function pc2(p){return p==='C'?{bg:'#E6F1FB',fg:'#0C447C'}:p==='M'?{bg:'#EEEDFE',fg:'#3C3489'}:{bg:'#E1F5EE',fg:'#085041'};}

function amk(){
  const ms=new Set();
  txs.forEach(t=>{if(t.month!==undefined)ms.add(mk(t.month,t.year));});
  inc.forEach(t=>{if(t.month!==undefined)ms.add(mk(t.month,t.year));});
  Object.keys(fx).forEach(k=>{if(Object.values(fx[k]).some(v=>v>0))ms.add(k);});
  ms.add(mk(now.getMonth(),now.getFullYear()));
  return[...ms].sort();
}

function rvs(){
  const sel=document.getElementById('viewSel'),keys=amk(),cur=mk(vm,vy);
  if(cv==='month'&&!keys.includes(cur)){vm=now.getMonth();vy=now.getFullYear();}
  let h=keys.map(k=>{const[y,m]=k.split('-');const s=cv==='month'&&(+m-1===vm&&+y===vy);return`<option value="m:${k}"${s?' selected':''}>${MO[+m-1]} ${y}</option>`;}).join('');
  h+=`<option value="summary"${cv==='summary'?' selected':''}>\u2014 Summary \u2014</option>`;
  sel.innerHTML=h;
}

function onViewChange(){
  const v=document.getElementById('viewSel').value;
  if(v==='summary'){
    cv='summary';
    document.getElementById('mainPage').classList.add('hidden');
    document.getElementById('summaryPage').classList.add('active');
    renderSummary();
  }else{
    const[,k]=v.split(':');const[y,m]=k.split('-');
    vm=+m-1;vy=+y;cv='month';eid=null;et=null;
    document.getElementById('summaryPage').classList.remove('active');
    document.getElementById('mainPage').classList.remove('hidden');
    renderDash();
  }
  rvs();
}

function setFormMode(mode){
  fm=mode;
  document.getElementById('tabExpense').classList.toggle('active',mode==='expense');
  document.getElementById('tabIncome').classList.toggle('active',mode==='income');
  renderForm();
}
function renderForm(){
  const row=document.getElementById('formRow');
  if(fm==='expense'){
    row.innerHTML=`<div class="field fdate"><label>Date</label><input type="date" id="fDate" value="${td()}"></div><div class="field fdesc"><label>Description</label><input id="fDesc" placeholder="e.g. Hiperdino" autocomplete="off"><div class="suggestion" id="sugBox" style="display:none"></div></div><div class="field famt"><label>Amount (\u20ac)</label><input id="fAmt" placeholder="0,00"></div><div class="field fcat"><label>Category</label><select id="fCat">${CATS.map(c=>`<option value="${c.id}">${c.label}</option>`).join('')}</select></div><div class="field fpers"><label>Person</label><select id="fPers"><option value="B">B \u2014 Joint</option><option value="C">C \u2014 Colin</option><option value="M">M \u2014 Monica</option></select></div><button class="add-btn" id="addEB" onclick="addTx()">Add</button>`;
    const d=document.getElementById('fDesc');
    d.addEventListener('input',oDescI);d.addEventListener('keydown',e=>{if(e.key==='Enter')addTx();});
    document.getElementById('fAmt').addEventListener('keydown',e=>{if(e.key==='Enter')addTx();});
  }else{
    row.innerHTML=`<div class="field fdate"><label>Date</label><input type="date" id="iDate" value="${td()}"></div><div class="field fdesc"><label>Source / Description</label><input id="iDesc" placeholder="e.g. Colin salary" autocomplete="off"></div><div class="field famt"><label>Amount (\u20ac)</label><input id="iAmt" placeholder="0,00"></div><div class="field fpers"><label>Person</label><select id="iPers"><option value="C">C \u2014 Colin</option><option value="M">M \u2014 Monica</option><option value="B">B \u2014 Joint</option></select></div><button class="add-btn income-btn" id="addIB" onclick="addInc()">Add income</button>`;
    document.getElementById('iDesc').addEventListener('keydown',e=>{if(e.key==='Enter')addInc();});
    document.getElementById('iAmt').addEventListener('keydown',e=>{if(e.key==='Enter')addInc();});
  }
}

function oDescI(){
  const q=document.getElementById('fDesc').value.trim(),box=document.getElementById('sugBox');
  if(!box)return;if(!q||q.length<2){box.style.display='none';return;}
  const m=txs.filter(t=>t.desc.toLowerCase().includes(q.toLowerCase())).sort((a,b)=>(b.year*12+b.month)-(a.year*12+a.month))[0];
  if(m){
    const c=cbi(m.cat),{bg,fg}=pc2(m.pers);
    box.innerHTML=`<div class="sug-item" onmousedown="apSug('${m.id}')"><div><div class="sug-name">${m.desc}</div><div class="sug-meta">Last: ${fd(m.date)||MO[m.month]+' '+m.year}</div></div><div style="display:flex;gap:5px;align-items:center;flex-shrink:0"><span class="sug-badge" style="background:${c.colors[0]};color:${c.colors[2]}">${c.label}</span><span class="sug-badge" style="background:${bg};color:${fg}">${m.pers}</span></div></div>`;
    box.style.display='block';
  }else box.style.display='none';
}
function apSug(id){
  const m=txs.find(t=>t.id===id);if(!m)return;
  document.getElementById('fDesc').value=m.desc;document.getElementById('fCat').value=m.cat;document.getElementById('fPers').value=m.pers;
  const b=document.getElementById('sugBox');if(b)b.style.display='none';
  document.getElementById('fAmt').focus();
}

async function addTx(){
  const desc=document.getElementById('fDesc').value.trim(),as=document.getElementById('fAmt').value;
  const cat=document.getElementById('fCat').value,pers=document.getElementById('fPers').value,date=document.getElementById('fDate').value;
  if(!desc||!as)return;const amt=pa(as);if(!amt)return;
  const{month,year}=dmy(date);
  const row={id:Date.now()+'_'+Math.random().toString(36).slice(2),desc,amt,cat,pers,date,month,year};
  const btn=document.getElementById('addEB');btn.disabled=true;ss('syncing','Saving\u2026');
  try{
    await sbUp('transactions',{id:row.id,description:row.desc,amt:row.amt,cat:row.cat,pers:row.pers,tx_date:row.date,month:row.month,year:row.year});
    txs.push(row);document.getElementById('fDesc').value='';document.getElementById('fAmt').value='';
    ss('synced','Saved');rvs();renderDash();
  }catch(e){ss('error','Save failed');console.error(e);}finally{btn.disabled=false;}
}

async function addInc(){
  const desc=document.getElementById('iDesc').value.trim(),as=document.getElementById('iAmt').value;
  const pers=document.getElementById('iPers').value,date=document.getElementById('iDate').value;
  if(!desc||!as)return;const amt=pa(as);if(!amt)return;
  const{month,year}=dmy(date);
  const row={id:Date.now()+'_'+Math.random().toString(36).slice(2),desc,amt,pers,date,month,year};
  const btn=document.getElementById('addIB');btn.disabled=true;ss('syncing','Saving\u2026');
  try{
    await sbUp('income',{id:row.id,description:row.desc,amt:row.amt,pers:row.pers,tx_date:row.date,month:row.month,year:row.year});
    inc.push(row);document.getElementById('iDesc').value='';document.getElementById('iAmt').value='';
    ss('synced','Saved');rvs();renderDash();
  }catch(e){ss('error','Save failed');console.error(e);}finally{btn.disabled=false;}
}

async function saveFx(fi){
  const key=mk(vm,vy);if(!fx[key])fx[key]={rent:0,electricity:0,water:0,internet:0};
  fx[key][fi]=pa(document.getElementById('fixed_'+fi).value)||0;
  ss('syncing','Saving\u2026');
  try{await sbUp('fixed_costs',{month_key:key,...fx[key]});ss('synced','Saved');rFixed();rDelta();rStats();rCats();rPies();}
  catch(e){ss('error','Save failed');console.error(e);}
}

function sEdit(id,type){eid=id;et=type;rLists();}
function cEdit(){eid=null;et=null;rLists();}
async function svEdit(id,type){
  const arr=type==='income'?inc:txs;const tx=arr.find(t=>t.id===id);if(!tx){cEdit();return;}
  const nd=document.getElementById('ed_desc').value.trim(),na=pa(document.getElementById('ed_amt').value);
  const ndt=document.getElementById('ed_date').value,np=document.getElementById('ed_pers').value;
  if(!nd||!na){cEdit();return;}
  const{month,year}=dmy(ndt);const u={...tx,desc:nd,amt:na,date:ndt,pers:np,month,year};
  if(type==='expense')u.cat=document.getElementById('ed_cat').value;
  ss('syncing','Saving\u2026');
  try{
    if(type==='expense')await sbUp('transactions',{id:u.id,description:u.desc,amt:u.amt,cat:u.cat,pers:u.pers,tx_date:u.date,month:u.month,year:u.year});
    else await sbUp('income',{id:u.id,description:u.desc,amt:u.amt,pers:u.pers,tx_date:u.date,month:u.month,year:u.year});
    arr[arr.findIndex(t=>t.id===id)]=u;eid=null;et=null;ss('synced','Saved');rvs();renderDash();
  }catch(e){ss('error','Save failed');console.error(e);}
}
async function delTx(id){ss('syncing','Deleting\u2026');try{await sbDel('transactions',id);txs=txs.filter(t=>t.id!==id);ss('synced','Deleted');rvs();renderDash();}catch(e){ss('error','Delete failed');console.error(e);}}
async function delInc(id){ss('syncing','Deleting\u2026');try{await sbDel('income',id);inc=inc.filter(t=>t.id!==id);ss('synced','Deleted');rvs();renderDash();}catch(e){ss('error','Delete failed');console.error(e);}}

function erExp(tx){
  const co=CATS.map(c=>`<option value="${c.id}"${tx.cat===c.id?' selected':''}>${c.label}</option>`).join('');
  const po=['B','C','M'].map(p=>`<option value="${p}"${tx.pers===p?' selected':''}>${p}</option>`).join('');
  return`<div class="tx-row editing col-expense"><div><input class="edit-input" id="ed_date" type="date" value="${tx.date||''}"></div><div><input class="edit-input" id="ed_desc" value="${tx.desc.replace(/"/g,'&quot;')}" style="width:100%"></div><div><input class="edit-input" id="ed_amt" value="${f(tx.amt)}" style="text-align:right"></div><div><select class="edit-select" id="ed_cat">${co}</select></div><div><select class="edit-select" id="ed_pers">${po}</select></div><div class="action-btns"><button class="btn-sm btn-save" onclick="svEdit('${tx.id}','expense')">Save</button><button class="btn-sm" onclick="cEdit()">\u2715</button></div></div>`;
}
function erInc(tx){
  const po=['C','M','B'].map(p=>`<option value="${p}"${tx.pers===p?' selected':''}>${p}</option>`).join('');
  return`<div class="tx-row editing col-income"><div><input class="edit-input" id="ed_date" type="date" value="${tx.date||''}"></div><div><input class="edit-input" id="ed_desc" value="${tx.desc.replace(/"/g,'&quot;')}" style="width:100%"></div><div><input class="edit-input" id="ed_amt" value="${f(tx.amt)}" style="text-align:right"></div><div><select class="edit-select" id="ed_pers">${po}</select></div><div class="action-btns"><button class="btn-sm btn-save" onclick="svEdit('${tx.id}','income')">Save</button><button class="btn-sm" onclick="cEdit()">\u2715</button></div></div>`;
}

function rDelta(){
  const vt=gvt(),vi=gvi(),ti=vi.reduce((s,t)=>s+t.amt,0),te=vt.reduce((s,t)=>s+t.amt,0)+fxt(),d=ti-te;
  const dc=d>0?'dc-positive':d<0?'dc-negative':'dc-zero',sg=d>0?'+':d<0?'\u2212':'';
  document.getElementById('deltaBar').innerHTML=`<div class="delta-card dc-income"><div class="lbl">Total income</div><div class="val">${f(ti)} \u20ac</div><div class="sub">${vi.length} entr${vi.length===1?'y':'ies'}</div></div><div class="delta-card dc-expense"><div class="lbl">Total expenses</div><div class="val">${f(te)} \u20ac</div><div class="sub">incl. fixed costs</div></div><div class="delta-card ${dc}"><div class="lbl">Monthly delta</div><div class="val">${sg}${f(Math.abs(d))} \u20ac</div><div class="sub">${d>=0?'Surplus this month':'Deficit this month'}</div></div>`;
}
function rStats(){
  const vt=gvt(),ft=fxt(),tot=vt.reduce((s,t)=>s+t.amt,0)+ft;
  const col=vt.filter(t=>t.pers==='C').reduce((s,t)=>s+t.amt,0)+vt.filter(t=>t.pers==='B').reduce((s,t)=>s+t.amt/2,0)+ft/2;
  const mon=vt.filter(t=>t.pers==='M').reduce((s,t)=>s+t.amt,0)+vt.filter(t=>t.pers==='B').reduce((s,t)=>s+t.amt/2,0)+ft/2;
  document.getElementById('statsRow').innerHTML=`<div class="stat"><div class="lbl">Total spent</div><div class="val red">${f(tot)} \u20ac</div></div><div class="stat"><div class="lbl">Colin's share</div><div class="val blue">${f(col)} \u20ac</div></div><div class="stat"><div class="lbl">Monica's share</div><div class="val purple">${f(mon)} \u20ac</div></div><div class="stat"><div class="lbl">Transactions</div><div class="val">${vt.length}</div></div>`;
}
function rFixed(){
  const fx2=gfx(),tot=fxt();
  let h=`<div class="fixed-header"><div class="card-title">Rent &amp; fixed costs</div>${tot>0?`<div class="fixed-total-badge">${f(tot)} \u20ac</div>`:''}</div><div class="fixed-grid">`;
  FF.forEach(fi=>{const v=fx2[fi.id]?f(fx2[fi.id]):'';h+=`<div class="fixed-item"><div class="fixed-label"><span style="font-size:13px">${fi.icon}</span>${fi.label}</div><input class="fixed-input${fx2[fi.id]?' filled':''}" id="fixed_${fi.id}" placeholder="${fi.ph}" value="${v}" onkeydown="if(event.key==='Enter')this.blur()" onblur="saveFx('${fi.id}')"></div>`;});
  document.getElementById('fixedCard').innerHTML=h+'</div>';
}
function rCats(){
  const vt=gvt(),tot=vt.reduce((s,t)=>s+t.amt,0)+fxt();
  document.getElementById('catList').innerHTML=CATS.map(c=>{let s=vt.filter(t=>t.cat===c.id).reduce((a,t)=>a+t.amt,0);if(c.id==='rent')s+=fxt();const pct=tot>0?Math.round(s/tot*100):0;return`<div class="cat-row${acat===c.id?' active':''}" onclick="fCat('${c.id}')"><div class="cat-dot" style="background:${c.colors[1]}"></div><div class="cat-name">${c.label}</div><div class="cat-amt" style="color:${c.colors[2]}">${f(s)} \u20ac</div><div class="cat-pct">${pct}%</div></div>`;}).join('');
}
function fCat(id){acat=acat===id?null:id;rLists();}
function rPies(){
  const vt=gvt(),ft=fxt(),tot=vt.reduce((s,t)=>s+t.amt,0)+ft;
  const sums=CATS.map(c=>{let s=vt.filter(t=>t.cat===c.id).reduce((a,t)=>a+t.amt,0);if(c.id==='rent')s+=ft;return parseFloat(s.toFixed(2));});
  document.getElementById('pieLeg').innerHTML=CATS.map((c,i)=>{const pct=tot>0?Math.round(sums[i]/tot*100):0;if(!sums[i])return'';return`<span><span class="sq" style="background:${c.colors[1]}"></span>${c.label} ${pct}%</span>`;}).join('');
  if(pc)pc.destroy();
  pc=new Chart(document.getElementById('pieChart'),{type:'doughnut',data:{labels:CATS.map(c=>c.label),datasets:[{data:sums,backgroundColor:CATS.map(c=>c.colors[1]),borderColor:CATS.map(c=>c.colors[0]),borderWidth:2,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const pct=tot>0?Math.round(ctx.parsed/tot*100):0;return`${ctx.label}: ${f(ctx.parsed)} \u20ac (${pct}%)`;}}}}}});
  const col=parseFloat((vt.filter(t=>t.pers==='C').reduce((s,t)=>s+t.amt,0)+vt.filter(t=>t.pers==='B').reduce((s,t)=>s+t.amt/2,0)+ft/2).toFixed(2));
  const mon=parseFloat((vt.filter(t=>t.pers==='M').reduce((s,t)=>s+t.amt,0)+vt.filter(t=>t.pers==='B').reduce((s,t)=>s+t.amt/2,0)+ft/2).toFixed(2));
  const pC=tot>0?Math.round(col/tot*100):0,pM=tot>0?Math.round(mon/tot*100):0;
  document.getElementById('pie2Leg').innerHTML=`<span><span class="sq" style="background:#378ADD"></span>Colin ${pC}% (${f(col)} \u20ac)</span><span><span class="sq" style="background:#7F77DD"></span>Monica ${pM}% (${f(mon)} \u20ac)</span>`;
  if(p2c)p2c.destroy();
  p2c=new Chart(document.getElementById('pie2Chart'),{type:'pie',data:{labels:['Colin','Monica'],datasets:[{data:[col,mon],backgroundColor:['#378ADD','#7F77DD'],borderColor:['#E6F1FB','#EEEDFE'],borderWidth:2,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{const pct=tot>0?Math.round(ctx.parsed/tot*100):0;return`${ctx.label}: ${f(ctx.parsed)} \u20ac (${pct}%)`;}}}}}});
}
function rLists(){
  const vi=gvi().slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const sec=document.getElementById('incomeSection');
  if(!vi.length){sec.innerHTML=`<div class="empty">No income recorded for this month</div>`;}
  else{
    let h=`<div class="tx-head col-income" style="background:var(--green-light)"><div>Date</div><div>Source</div><div>Amount</div><div>Person</div><div></div></div>`;
    vi.forEach(t=>{if(eid===t.id&&et==='income'){h+=erInc(t);return;}const{bg,fg}=pc2(t.pers);h+=`<div class="tx-row col-income"><div class="date-cell">${fd(t.date)}</div><div class="desc-cell">${t.desc}</div><div class="amt-cell" style="color:var(--green)">${f(t.amt)} \u20ac</div><div><span class="badge" style="background:${bg};color:${fg}">${t.pers}</span></div><div class="action-btns"><button class="btn-sm" onclick="sEdit('${t.id}','income')">Edit</button><button class="btn-sm btn-del" onclick="delInc('${t.id}')">Del</button></div></div>`;});
    sec.innerHTML=h;
  }
  const vt=gvt().filter(t=>!acat||t.cat===acat).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const el=document.getElementById('txList');
  if(!vt.length){el.innerHTML=`<div class="empty">No expenses for this month</div>`;return;}
  const bc2={};CATS.forEach(c=>{bc2[c.id]=[];});vt.forEach(t=>{if(bc2[t.cat])bc2[t.cat].push(t);});
  let h=`<div class="tx-head col-expense"><div>Date</div><div>Description</div><div>Amount</div><div>Category</div><div>Person</div><div></div></div>`;
  CATS.forEach(c=>{const ct=bc2[c.id];if(!ct.length)return;h+=`<div class="section-sep" style="color:${c.colors[2]};background:${c.colors[0]}">${c.label}</div>`;ct.forEach(t=>{if(eid===t.id&&et==='expense'){h+=erExp(t);return;}const{bg,fg}=pc2(t.pers);h+=`<div class="tx-row col-expense"><div class="date-cell">${fd(t.date)}</div><div class="desc-cell" title="${t.desc}">${t.desc}</div><div class="amt-cell" style="color:var(--red)">${f(t.amt)} \u20ac</div><div><span class="badge" style="background:${c.colors[0]};color:${c.colors[2]}">${c.label}</span></div><div><span class="badge" style="background:${bg};color:${fg}">${t.pers}</span></div><div class="action-btns"><button class="btn-sm" onclick="sEdit('${t.id}','expense')">Edit</button><button class="btn-sm btn-del" onclick="delTx('${t.id}')">Del</button></div></div>`;});});
  el.innerHTML=h;
}
function renderDash(){rvs();rDelta();rStats();rFixed();rCats();rPies();rLists();}

function renderSummary(){
  const keys=amk();
  const md=keys.map(k=>{
    const[y,m]=k.split('-');const mo=+m-1,yr=+y;
    const mt=txs.filter(t=>t.month===mo&&t.year===yr);
    const mi=inc.filter(t=>t.month===mo&&t.year===yr);
    const ft=fxt(mo,yr);
    const exp=mt.reduce((s,t)=>s+t.amt,0)+ft;
    const income=mi.reduce((s,t)=>s+t.amt,0);
    const cats={};CATS.forEach(c=>{cats[c.id]=mt.filter(t=>t.cat===c.id).reduce((s,t)=>s+t.amt,0);if(c.id==='rent')cats[c.id]+=ft;});
    return{key:k,lbl:`${MS[mo]} ${yr}`,full:`${MO[mo]} ${yr}`,mo,yr,income,exp,cats};
  });
  const grid=document.getElementById('smg');grid.innerHTML='';
  md.forEach(m=>{
    const d=m.income-m.exp,mx=Math.max(...Object.values(m.cats),1);
    const bars=CATS.map(c=>`<div class="mini-bar" style="background:${c.colors[1]};height:${Math.max(2,Math.round((m.cats[c.id]||0)/mx*26))}px" title="${c.label}: ${f(m.cats[c.id]||0)} \u20ac"></div>`).join('');
    const card=document.createElement('div');card.className='smc';
    card.innerHTML=`<div class="smc-name">${m.full}</div><div class="smc-exp">${f(m.exp)} \u20ac</div><div class="smc-inc">Income: ${f(m.income)} \u20ac</div><div class="smc-delta ${d>=0?'pos':'neg'}">${d>=0?'+':''}${f(Math.abs(d))} \u20ac delta</div><div class="mini-bars">${bars}</div>`;
    card.onclick=()=>{vm=m.mo;vy=m.yr;cv='month';document.getElementById('summaryPage').classList.remove('active');document.getElementById('mainPage').classList.remove('hidden');renderDash();rvs();};
    grid.appendChild(card);
  });
  if(tc)tc.destroy();
  tc=new Chart(document.getElementById('trendChart'),{type:'line',data:{labels:md.map(m=>m.lbl),datasets:[{label:'Expenses',data:md.map(m=>m.exp),borderColor:'#b83030',backgroundColor:'rgba(184,48,48,0.07)',tension:0.4,fill:true,pointRadius:5,pointBackgroundColor:'#b83030',pointBorderColor:'#fff',pointBorderWidth:2},{label:'Income',data:md.map(m=>m.income),borderColor:'#1a6644',backgroundColor:'rgba(26,102,68,0.07)',tension:0.4,fill:true,pointRadius:5,pointBackgroundColor:'#1a6644',pointBorderColor:'#fff',pointBorderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>fs(v)+'\u20ac',font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},x:{ticks:{font:{size:10}},grid:{display:false}}}}});
  if(bc)bc.destroy();
  bc=new Chart(document.getElementById('incExpChart'),{type:'bar',data:{labels:md.map(m=>m.lbl),datasets:[{label:'Income',data:md.map(m=>m.income),backgroundColor:'rgba(26,102,68,0.75)',borderRadius:5,borderSkipped:false},{label:'Expenses',data:md.map(m=>m.exp),backgroundColor:'rgba(184,48,48,0.75)',borderRadius:5,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>fs(v)+'\u20ac',font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},x:{ticks:{font:{size:10}},grid:{display:false}}}}});
  const tbl=document.getElementById('btbl');
  let h=`<thead><tr><th>Category</th>${md.map(m=>`<th>${m.lbl}</th>`).join('')}<th>Avg / mo</th><th>Trend</th></tr></thead><tbody>`;
  CATS.forEach(c=>{
    const vals=md.map(m=>m.cats[c.id]||0);
    const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
    const last=vals[vals.length-1],prev=vals[vals.length-2]||0;
    let tr,tc2;
    if(last>prev*1.15&&prev>0){tr='\u2191 Rising';tc2='t-up';}
    else if(prev>0&&last<prev*0.85){tr='\u2193 Falling';tc2='t-dn';}
    else{tr='\u2192 Stable';tc2='t-fl';}
    h+=`<tr><td><span class="cdot" style="background:${c.colors[1]}"></span>${c.label}</td>${vals.map(v=>`<td class="${v===0?'zcell':''}">${v>0?f(v)+' \u20ac':'\u2014'}</td>`).join('')}<td>${f(avg)} \u20ac</td><td class="${tc2}">${tr}</td></tr>`;
  });
  const tots=md.map(m=>m.exp),avgT=tots.reduce((a,b)=>a+b,0)/tots.length;
  h+=`<tr class="tot-row"><td><strong>Total</strong></td>${tots.map(v=>`<td><strong>${f(v)} \u20ac</strong></td>`).join('')}<td><strong>${f(avgT)} \u20ac</strong></td><td></td></tr></tbody>`;
  tbl.innerHTML=h;
}

function exportExcel(){
  const wb=XLSX.utils.book_new();
  const er=[['Date','Description','Amount','Category','Person']];
  txs.slice().sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(t=>{er.push([t.date||'',t.desc,t.amt,cbi(t.cat).label,t.pers]);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(er),'Expenses');
  const ir=[['Date','Description','Amount','Person']];
  inc.slice().sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(t=>{ir.push([t.date||'',t.desc,t.amt,t.pers]);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ir),'Income');
  const fr=[['Month','Rent','Electricity','Water','Internet']];
  Object.entries(fx).sort().forEach(([k,v])=>{const[y,m]=k.split('-');fr.push([`${MO[+m-1]} ${y}`,v.rent||0,v.electricity||0,v.water||0,v.internet||0]);});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(fr),'Fixed Costs');
  XLSX.writeFile(wb,'budget_export.xlsx');
}

async function importExcel(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async ev=>{
    ss('syncing','Importing\u2026');
    try{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const toD=v=>{if(!v)return'';if(typeof v==='number'){const d=new Date(Math.round((v-25569)*86400*1000));return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}return String(v);};
      if(wb.SheetNames.includes('Expenses')){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets['Expenses'],{header:1});
        for(let i=1;i<rows.length;i++){
          const[dt,desc,amt,catL,pers]=rows[i];if(!desc||!amt)continue;
          const co=CATS.find(c=>c.label===catL)||CATS[CATS.length-1];
          const ds=toD(dt);const{month,year}=dmy(ds);
          const row={id:'imp_'+Date.now()+'_'+i,desc:String(desc),amt:parseFloat(amt)||0,cat:co.id,pers:String(pers||'B'),date:ds,month,year};
          await sbUp('transactions',{id:row.id,description:row.desc,amt:row.amt,cat:row.cat,pers:row.pers,tx_date:row.date,month:row.month,year:row.year});
          txs.push(row);
        }
      }
      if(wb.SheetNames.includes('Income')){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets['Income'],{header:1});
        for(let i=1;i<rows.length;i++){
          const[dt,desc,amt,pers]=rows[i];if(!desc||!amt)continue;
          const ds=toD(dt);const{month,year}=dmy(ds);
          const row={id:'imp_'+Date.now()+'_i'+i,desc:String(desc),amt:parseFloat(amt)||0,pers:String(pers||'C'),date:ds,month,year};
          await sbUp('income',{id:row.id,description:row.desc,amt:row.amt,pers:row.pers,tx_date:row.date,month:row.month,year:row.year});
          inc.push(row);
        }
      }
      if(wb.SheetNames.includes('Fixed Costs')){
        const rows=XLSX.utils.sheet_to_json(wb.Sheets['Fixed Costs'],{header:1});
        for(let i=1;i<rows.length;i++){
          const[ml,rent,electricity,water,internet]=rows[i];if(!ml)continue;
          const p=String(ml).split(' ');const mo=MO.indexOf(p[0]),yr=parseInt(p[1]);
          if(mo<0||isNaN(yr))continue;
          const key=mk(mo,yr);fx[key]={rent:parseFloat(rent)||0,electricity:parseFloat(electricity)||0,water:parseFloat(water)||0,internet:parseFloat(internet)||0};
          await sbUp('fixed_costs',{month_key:key,...fx[key]});
        }
      }
      ss('synced','Import done');rvs();renderAll();
    }catch(err){ss('error','Import failed');console.error(err);}
    e.target.value='';
  };
  reader.readAsArrayBuffer(file);
}

function renderAll(){if(cv==='summary')renderSummary();else renderDash();}

renderForm();renderDash();loadAll();
